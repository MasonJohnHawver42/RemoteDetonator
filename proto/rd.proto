syntax = "proto3";

package rd;

message Ping {}
message Pong {}

// ── Multi-slot firing protocol ───────────────────────────────────────────────
// One Arm/Fire exchange per device per sequence. Repeated fields are bounded
// by the static max_count in rd.options (= 4 slots).
// bool success is placed last in each message so it does not introduce a
// padding byte before the next pb_size_t (uint16) count field.

// Master → slave: arm a list of slots.
// fire_timeout_ms is how long the slave should hold slots armed while the
// master finishes arming remaining devices and begins the fire phase.
message MultiArm {
  uint32          device_id       = 1;
  uint32          action_id       = 2;
  repeated uint32 slots           = 3;
  uint32          fire_timeout_ms = 4;
}

// Slave → master: outcome of a MultiArm.
// success is true only if every requested slot was armed.
message ArmResponse {
  uint32          device_id           = 1;
  uint32          action_id           = 2;
  repeated uint32 slots_armed         = 3;
  repeated uint32 slots_already_fired = 4;
  repeated uint32 slots_failed        = 5;
  bool            success             = 6;
}

// Master → slave: fire a list of slots (only those in ArmResponse.slots_armed).
// durations_ms[i] is how long to keep power on for slots[i] in milliseconds.
message MultiFire {
  uint32          device_id    = 1;
  uint32          action_id    = 2;
  repeated uint32 slots        = 3;
  repeated uint32 durations_ms = 4;
}

// Slave → master: outcome of a MultiFire.
// success is true only if every requested slot pulsed.
message FireResponse {
  uint32          device_id    = 1;
  uint32          action_id    = 2;
  repeated uint32 slots_fired  = 3;
  repeated uint32 slots_failed = 4;
  bool            success      = 5;
}

// Master → slave: return a list of slots to IDLE.
// Empty slots list resets every slot on the device.
message Reset {
  uint32          device_id = 1;
  uint32          action_id = 2;
  repeated uint32 slots     = 3;
}

// Slave-originated error (e.g. failed to send a response).
message Error { uint32 device_id = 1; }

message Envelope {
  uint32 seq = 1;
  oneof payload {
    Ping         ping          = 10;
    Pong         pong          = 11;
    MultiArm     multi_arm     = 12;
    ArmResponse  arm_response  = 13;
    MultiFire    multi_fire    = 15;
    FireResponse fire_response = 16;
    Reset        reset         = 17;
    Error        error         = 20;
  }
}
